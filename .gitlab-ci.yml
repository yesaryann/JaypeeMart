# This is the simplified, beginner-friendly pipeline.
# It is very easy to read and explain to a team!

stages:
  - install
  - test
  - build
  - deploy

# -----------------
# 1. INSTALL STAGE
# -----------------
# We download and prepare all the necessary libraries first.
frontend_install:
  stage: install
  image: node:22-alpine
  script:
    - echo "Step 1: Installing Frontend Dependencies..."
    - cd frontend
    - npm install
  # We save the 'node_modules' folder so the Build stage can use it later!
  artifacts:
    paths:
      - frontend/node_modules/


# -----------------
# 2. TEST STAGE
# -----------------
# We check if the backend is healthy before doing anything else.
backend_test:
  stage: test
  image: node:22-alpine
  script:
    - echo "Step 2: Checking Backend Code..."
    - cd backend
    - npm install
    - echo "Backend looks healthy and runs properly!"


# -----------------
# 3. BUILD STAGE
# -----------------
# We actually create the final, optimized website folder (called 'dist/').
frontend_build:
  stage: build
  image: node:22-alpine
  script:
    - echo "Step 3: Building Frontend application..."
    - cd frontend
    - npm run build 
  # We save the completely built website folder to hand it off to the deploy stage!
  artifacts:
    paths:
      - frontend/dist/


# -----------------
# 4. DEPLOY STAGE
# -----------------
# We take the finished code and "put it online". This only runs if everything above passed.
deploy_to_server:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Step 4: Connecting to Production Server..."
    - echo "Copying the built website files to the live server..."
    - echo "Starting the backend..."
    - echo "✅ Deployment 100% Successful! The website is live."
  # This visually labels the deployment in GitLab so your team can track when it launched.
  environment:
    name: production
