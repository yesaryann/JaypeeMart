# This file tells GitLab how to run your pipeline.
# Pipelines are essentially a set of instructions executed by a "Runner" (a server provided by GitLab or yourself).

# 1. STAGES
# Stages define the order of execution. Jobs in the same stage run in parallel. 
# Jobs in the next stage run only after the previous stage finishes successfully.
stages:
  - install
  - test
  - build

# 2. JOBS
# A Job is a specific task we want to run, like 'test the frontend' or 'build the backend'.

# --- FRONTEND JOBS ---
frontend_install:
  stage: install
  image: node:22-alpine # Tells GitLab to use a Docker container with Node.js 22 to run these commands
  script:
    - echo "Installing Frontend Dependencies..."
    - cd frontend
    - npm install
  # Artifacts save files generated by a job so they can be passed to the next stage
  artifacts:
    paths:
      - frontend/node_modules/

frontend_build:
  stage: build
  image: node:22-alpine
  script:
    - echo "Building Frontend application..."
    - cd frontend
    # Since node_modules were saved in the previous stage, Vite can build the application here!
    - npm run build 


# --- BACKEND JOBS ---
backend_test:
  stage: test
  image: node:22-alpine
  script:
    - echo "Running Backend Checks..."
    - cd backend
    - npm install
    # Normally you would run `npm test` here if you had Jest or Mocha tests written!
    - echo "Backend is healthy!"
